<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://live.lptedtech.com" />

    <!-- Preload LCP image (WebP) for faster initial render -->
    <link
      rel="preload"
      as="image"
      href="/hero-image.webp"
      fetchpriority="high"
      type="image/webp"
    />
    <link
      rel="preload"
      as="image"
      href="/hero-image-mobile.webp"
      media="(max-width: 640px)"
      fetchpriority="high"
      type="image/webp"
    />

    <!-- Preload critical font -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="https://fonts.gstatic.com/s/inter/v18/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa1ZL7.woff2"
      crossorigin
    />

    <!-- Critical inline CSS for above-the-fold content -->
    <style>
      *,
      ::after,
      ::before {
        box-sizing: border-box;
        border-width: 0;
        border-style: solid;
      }
      html {
        line-height: 1.5;
        -webkit-text-size-adjust: 100%;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      body {
        margin: 0;
        line-height: inherit;
      }
      main {
        display: block;
      }
      img {
        display: block;
        max-width: 100%;
        height: auto;
      }
      button,
      input,
      select {
        font-family: inherit;
        font-size: 100%;
        margin: 0;
      }
      button {
        cursor: pointer;
      }
      :root {
        --background: 0 0% 100%;
        --foreground: 222.2 84% 4.9%;
        --primary: 222.2 47.4% 11.2%;
      }
      .bg-background {
        background-color: hsl(var(--background));
      }
      .bg-white {
        background-color: #fff;
      }
      .min-h-screen {
        min-height: 100vh;
      }
      /* LCP image container - prevents CLS */
      .lcp-container {
        aspect-ratio: 4/3;
        background: #f3f4f6;
      }
    </style>

    <!-- Load fonts with preload and non-blocking -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript
      ><link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    /></noscript>

    <title>LPT Edtech — Best CUET Coaching in Delhi NCR</title>
    <meta
      name="description"
      content="Top CUET coaching institute in Delhi NCR. Prepare for DU, JNU, BHU & 250+ central universities with expert faculty at LPT Edtech. Centers in South Delhi, Gurugram, North Delhi & Noida."
    />
    <meta name="author" content="LPT Edtech" />
    <meta
      property="og:title"
      content="LPT Edtech — Best CUET Coaching in Delhi NCR"
    />
    <meta
      property="og:description"
      content="Top CUET coaching in Delhi NCR. Get into DU, JNU, BHU & top central universities. Book Free Counselling now!"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content="https://live.lptedtech.com/wp-content/uploads/2026/02/IPMAT-PREPARE-AD-copy_1600X900.jpg.jpeg"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="LPT Edtech — Best CUET Coaching in Delhi NCR"
    />
    <meta
      name="twitter:image"
      content="https://live.lptedtech.com/wp-content/uploads/2026/02/IPMAT-PREPARE-AD-copy_1600X900.jpg.jpeg"
    />
  </head>

  <body>
    <main id="root"></main>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Meta Pixel Code — Deferred to not block rendering -->
    <script defer>
      !(function (f, b, e, v, n, t, s) {

        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = !0;
        n.version = "2.0";
        n.queue = [];
        t = b.createElement(e);
        t.async = !0;
        t.src = v;
        s = b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t, s);
      })(
        window,
        document,
        "script",

</html>
